name: Create Shortlink

on:
  issues:
    types: [opened]

jobs:
  build:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'shortlink-request')
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Firebase Admin
        run: npm install firebase-admin @actions/github

      - name: Process Shortlink Request
        uses: actions/github-script@v6
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        with:
          script: |
            const admin = require('firebase-admin');
            const body = context.payload.issue.body;
            
            // Helper to parse issue template body
            function getFieldValue(sectionName) {
              const regex = new RegExp('### ' + sectionName + '\\s*\\n\\s*([\\s\\S]*?)(?:\\n\\n###|$)', 'i');
              const match = body.match(regex);
              return match ? match[1].trim() : '';
            }

            const targetUrl = getFieldValue('Destination URL');
            let customCode = getFieldValue('Custom Code / Alias \\(Optional\\)');

            // Clean custom code
            customCode = customCode.replace(/[^a-zA-Z0-9\-]/g, '').trim();

            if (!targetUrl) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: "❌ Error: Destination URL is empty or invalid."
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                state: 'closed',
                labels: ['invalid']
              });
              return;
            }

            // Generate code if empty
            let code = customCode;
            if (!code) {
              const chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
              for (let i = 0; i < 6; i++) {
                code += chars.charAt(Math.floor(Math.random() * chars.length));
              }
            }

            const serviceAccountRaw = process.env.FIREBASE_SERVICE_ACCOUNT;
            if (!serviceAccountRaw) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: "❌ Error: GitHub secret `FIREBASE_SERVICE_ACCOUNT` not configured."
              });
              return;
            }

            try {
              let serviceAccount;
              try {
                serviceAccount = JSON.parse(serviceAccountRaw);
              } catch (e) {
                throw new Error("FIREBASE_SERVICE_ACCOUNT is not valid JSON.");
              }

              if (admin.apps.length === 0) {
                admin.initializeApp({
                  credential: admin.credential.cert(serviceAccount)
                });
              }

              const db = admin.firestore();
              const docRef = db.collection('shortlinks').doc(code);
              
              // Transactions to ensure atomicity and uniqueness
              const success = await db.runTransaction(async (t) => {
                const docSnap = await t.get(docRef);
                if (docSnap.exists) {
                  return false; // Code already taken
                }
                t.set(docRef, {
                  url: targetUrl,
                  created_at: admin.firestore.FieldValue.serverTimestamp()
                });
                return true;
              });

              if (!success) {
                if (customCode) {
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: context.issue.number,
                    body: `❌ Error: The code \`${code}\` is already in use. Please request a different custom code.`
                  });
                  await github.rest.issues.update({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: context.issue.number,
                    state: 'closed',
                    labels: ['duplicate']
                  });
                } else {
                  throw new Error("Random code collision. Try again.");
                }
                return;
              }

              // Success
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `🎉 **Shortlink Created!**\n\nShort URL: **[erc.my.id/s/${code}](https://erc.my.id/s/${code})**\nRedirects to: ${targetUrl}`
              });

              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                state: 'closed',
                labels: ['completed']
              });

            } catch (err) {
              console.error(err);
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `❌ Database Write Failed: \`${err.message}\``
              });
            }
