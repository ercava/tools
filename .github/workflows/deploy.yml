name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v3

      - name: Setup Pages
        uses: actions/configure-pages@v3

      - name: Inject Firebase Client Config
        env:
          FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG }}
        run: |
          if [ -z "$FIREBASE_CONFIG" ]; then
            echo "Warning: FIREBASE_CONFIG secret is empty."
            exit 0
          fi
          # Replace placeholder in target files
          node -e '
            const fs = require("fs");
            const config = process.env.FIREBASE_CONFIG;
            const files = ["s/index.html", "shortlink/index.html"];
            files.forEach(file => {
              if (fs.existsSync(file)) {
                let content = fs.readFileSync(file, "utf8");
                content = content.replace("const HARDCODED_CONFIG = null;", `const HARDCODED_CONFIG = ${config};`);
                fs.writeFileSync(file, content, "utf8");
                console.log(`Injected config into ${file}`);
              }
            });
          '

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v1
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2
