<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kampus | Ercavian SNBT</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        .layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            min-height: 100vh;
        }

        .sidebar {
            background: var(--primary-navy);
            padding: 2rem;
            border-right: 1px solid var(--glass-border);
            color: white;
        }

        .main-content {
            padding: 2.5rem;
            background: var(--bg-light);
        }

        .nav-links {
            margin-top: 3rem;
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 1rem;
            color: #cbd5e1;
            text-decoration: none;
            border-radius: 1rem;
            margin-bottom: 0.5rem;
            transition: var(--transition);
        }

        .nav-item i {
            margin-right: 1rem;
        }

        .nav-item.active,
        .nav-item:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--accent-gold);
        }

        #map {
            height: 400px;
            border-radius: 2rem;
            margin-bottom: 4rem;
            border: 1px solid var(--glass-border);
            z-index: 1;
        }

        .uni-section {
            margin-bottom: 3rem;
        }

        .uni-title {
            font-size: 1.2rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
            color: var(--primary-navy);
            display: flex;
            align-items: center;
        }

        .uni-title::after {
            display: none;
        }

        .student-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .student-card {
            border: 1px solid var(--glass-border);
        }
    </style>
</head>

<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="brand-text" style="padding: 2.5rem 2rem 0;">ERCAVIAN<br>PTN/PTLN 100%</div>
            <nav class="nav-links">
                <a href="dashboard" class="nav-item"><i class="fas fa-home"></i> Beranda</a>
                <a href="todo" class="nav-item"><i class="fas fa-list-check"></i> Daftar Tugas</a>
                <a href="materials" class="nav-item"><i class="fas fa-book"></i> Materi Belajar</a>
                <a href="spiritual" class="nav-item"><i class="fas fa-pray"></i> Jalur Langit</a>

                <div class="nav-dropdown" id="moreDropdown">
                    <div class="nav-item dropdown-trigger" onclick="toggleDropdown()">
                        <i class="fas fa-ellipsis-h"></i> Lainnya <i class="fas fa-chevron-down"
                            style="margin-left: auto; font-size: 0.7rem;"></i>
                    </div>
                    <div class="dropdown-content">
                        <a href="rankings" class="dropdown-item"><i class="fas fa-trophy"></i> Peringkat TO</a>
                        <a href="campus" class="dropdown-item active"><i class="fas fa-university"></i> Target
                            Kampus</a>
                        <a href="streak" class="dropdown-item"><i class="fas fa-fire"></i> Statistik Streak</a>
                    </div>
                </div>

                <div class="logout-container">
                    <a href="index" class="nav-item" style="color: #f87171;"><i class="fas fa-sign-out-alt"></i>
                        Keluar</a>
                </div>
            </nav>
        </aside>

        <script>
            function toggleDropdown() {
                document.getElementById('moreDropdown').classList.toggle('active');
            }
        </script>

        <main class="main-content">
            <header style="margin-bottom: 3rem;">
                <h2 style="font-size: 2rem; font-weight: 800;">Sebaran Mahasiswa</h2>
                <p style="color: var(--text-gray);">Peta sebaran target universitas angkatan Ercavian di seluruh
                    penjuru.</p>
            </header>

            <div id="map"></div>

            <div id="campusContainer">
                <!-- Grouped students will be injected here -->
            </div>
        </main>
    </div>

    <script>
        const map = L.map('map').setView([4.0, 115.0], 4);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CARTO'
        }).addTo(map);

        const uniCoords = {
            'UNIVERSITAS INDONESIA': [-6.362, 106.824],
            'INSTITUT TEKNOLOGI BANDUNG': [-6.8914, 107.6104], // Bandung
            'INSTITUT PERTANIAN BOGOR': [-6.5971, 106.7949],  // Bogor
            'UNIVERSITAS GADJAH MADA': [-7.7713, 110.3775],   // Yogyakarta
            'UNIVERSITAS AIRLANGGA': [-7.2675, 112.7521],     // Surabaya
            'PTLN': [14.5995, 120.9842]                       // Manila, Phillippines
        };

        Papa.parse('data/students_data.csv?v=' + Date.now(), {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function (results) {
                const container = document.getElementById('campusContainer');

                // Grouping Logic
                const groups = {};
                results.data.forEach(student => {
                    if (!student.name || !student.univ1) return;
                    let key = student.status === 'PTLN' ? 'PTLN (Kampus Luar Negeri)' : student.univ1;
                    if (!groups[key]) groups[key] = [];
                    groups[key].push(student);

                    // Map Markers logic
                    let coords = null;
                    if (student.status === 'PTLN') {
                        coords = uniCoords['PTLN'];
                    } else {
                        coords = uniCoords[student.univ1.trim().toUpperCase()];
                    }

                    if (coords) {
                        L.marker(coords).addTo(map).bindPopup(`<b>${student.status === 'PTLN' ? 'Tujuan PTLN' : student.univ1}</b><br>Target oleh ${student.name}`);
                    }
                });

                // Render Groups
                Object.keys(groups).sort().forEach(key => {
                    const section = document.createElement('div');
                    section.className = 'uni-section';

                    let html = `<h3 class="uni-title">${key}</h3>`;
                    html += `<div class="student-grid">`;

                    groups[key].forEach(student => {
                        html += `
                            <div class="glass-card student-card">
                                <div style="font-weight: 800; font-size: 1.1rem; margin-bottom: 0.5rem; color:var(--primary-navy);">${student.name}</div>
                                <div style="font-size: 0.8rem; color: var(--text-gray); font-weight: 600;">${student.class} | ${student.status}</div>
                                <div style="margin-top: 1.2rem;">
                                    <div style="font-size: 0.75rem; background: #f1f5f9; padding: 0.8rem; border-radius: 8px;">
                                        <strong>Pilihan Utama:</strong><br>
                                        <div style="margin-top:4px; font-weight: 700; color:var(--primary-navy);">${student.univ1}</div>
                                        <div style="color:var(--text-gray); font-size: 0.7rem;">${student.program1}</div>
                                    </div>
                                </div>
                            </div>
                        `;
                    });

                    html += `</div>`;
                    section.innerHTML = html;
                    container.appendChild(section);
                });
            }
        });
    </script>
</body>

</html>
