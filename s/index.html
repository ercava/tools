    }

    .container {
      width: 100%;
      max-width: 420px;
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: 12px;

      padding: 2rem;
      text-align: center;
    }

    /* Spinner */
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--line);
      border-top-color: var(--accent);
      border-radius: 50%;
      margin: 0 auto 1.5rem;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    h1 {

    p {

      font-size: 0.85rem;
    }

    .code-pill {
      display: inline-block;
      font-family: 'Roboto Mono', monospace;
      background: var(--bg-light);
      border: 1px solid var(--line);
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      color: var(--primary);
      font-size: 0.85rem;
    }

    /* Error state */
    .error-icon {
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }

    .error-state h1 { color: var(--error); }

    .btn {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.7rem 1.5rem;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.8rem;
      border-radius: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      transition: background 0.2s;
    }
    .btn:hover { background: var(--primary); }

    .hidden { display: none !important; }

<body>

  <div class="container">
    <!-- Loading -->
    <div id="loader-view">
      <div class="spinner"></div>
      <h1>Redirecting</h1>
      <p>loading up yoo <span class="code-pill" id="code-lbl">...</span></p>
    </div>

    <!-- Error -->
    <div id="error-view" class="hidden error-state">

      <h1 id="error-title">Nothing shows up...</h1>
	    <div class="wrap">
    <p class="error-code">404</p>
    <img class="mascot" src="https://erc.my.id/error.png" alt="Confused mascot" />

  </div>
      <p id="error-msg">This erc link is missing.</p>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";


	const firebaseConfig = {
	  apiKey: "AIzaSyA4_Ya88eeqTfzwHpDEksmf3WZpDwfagqw",
	  authDomain: "shortlinks-a14cb.firebaseapp.com",
	  projectId: "shortlinks-a14cb",
	  storageBucket: "shortlinks-a14cb.firebasestorage.app",
	  messagingSenderId: "1035139869978",
	  appId: "1:1035139869978:web:3629fcc6dc30e8948c50a3",
	  measurementId: "G-4VVLMTEQWV"
	};

    function showError(title, msg) {
      document.getElementById('error-title').textContent = title;
      document.getElementById('error-msg').textContent = msg;
      document.getElementById('loader-view').classList.add('hidden');
      document.getElementById('error-view').classList.remove('hidden');
    }

    function getCode() {
      const path = window.location.pathname;
      const params = new URLSearchParams(window.location.search);
      if (params.has('c')) return params.get('c').trim();
      const segments = path.split('/').filter(Boolean);
      if (segments.length > 0) {
        const last = segments[segments.length - 1];
        if (last !== 's' && last !== 'index.html') return last;
      }
      return '';
    }

    function sanitizeCode(code) {
      return code.replace(/[^a-zA-Z0-9\-]/g, '');
    }

    async function init() {
      const code = sanitizeCode(getCode());
      document.getElementById('code-lbl').textContent = code || '?';

      if (!code) {
        showError('Nothing shows up...', 'Please check your Erclink.');
        return;
      }

      try {
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const docSnap = await getDoc(doc(db, "shortlinks", code));

        if (!docSnap.exists()) {
          showError('Link Not Found', `No destination for: "${code}"`);
          return;
        }

        let dest = docSnap.data().url;
        if (!/^https?:\/\//i.test(dest)) dest = 'https://' + dest;
        window.location.href = dest;

      } catch (err) {
        showError('Error', err.message || 'Failed to connect to database.');
        console.error(err);
      }
    }

    init();
  </script>
</body>
