<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting...</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Roboto+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #090d16;
      --card-bg: rgba(17, 24, 39, 0.7);
      --border: rgba(255, 255, 255, 0.08);
      --accent: #3b82f6;
      --accent-glow: rgba(59, 130, 246, 0.3);
      --text: #f3f4f6;
      --muted: #9ca3af;
      --error: #ef4444;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(59, 130, 246, 0.05) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(147, 51, 234, 0.05) 0%, transparent 40%);
    }

    .container {
      width: 90%;
      max-width: 480px;
      padding: 2.5rem;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      backdrop-filter: blur(16px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      text-align: center;
    }

    .loader {
      width: 64px;
      height: 64px;
      border: 4px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      margin: 0 auto 2rem;
      animation: spin 1s infinite linear;
      box-shadow: 0 0 15px var(--accent-glow);
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.5rem; letter-spacing: -0.02em; }
    p { color: var(--muted); font-size: 0.95rem; }
    .code-display {
      font-family: 'Roboto Mono', monospace;
      background: rgba(255, 255, 255, 0.05);
      padding: 0.2rem 0.5rem;
      border-radius: 6px;
      color: var(--accent);
    }

    .error-icon { font-size: 3rem; color: var(--error); margin-bottom: 1.5rem; }
    .btn {
      display: inline-block;
      margin-top: 2rem;
      padding: 0.8rem 1.8rem;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      border-radius: 10px;
      transition: all 0.2s;
      box-shadow: 0 4px 12px var(--accent-glow);
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px var(--accent-glow); }
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div class="container">
    <!-- Redirect UI -->
    <div id="redirect-view">
      <div class="loader"></div>
      <h1>Redirecting</h1>
      <p>Taking you to destination for <span class="code-display" id="code-lbl">...</span></p>
    </div>

    <!-- Real 404 UI -->
    <div id="notfound-view" class="hidden">
      <div class="error-icon">⚠️</div>
      <h1 id="error-title">Page Not Found</h1>
      <p id="error-msg">The page you are looking for does not exist.</p>
      <a href="https://erc.my.id/" class="btn">Go Home</a>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const HARDCODED_CONFIG = null;

    function getCodeFromPath() {
      const path = window.location.pathname;
      const segments = path.split('/').filter(Boolean);
      const sIndex = segments.indexOf('s');
      if (sIndex !== -1 && segments[sIndex + 1]) {
        return segments[sIndex + 1].trim();
      }
      return null;
    }

    function sanitizeCode(code) {
      return code.replace(/[^a-zA-Z0-9\-]/g, '');
    }

    async function init() {
      const rawCode = getCodeFromPath();
      if (!rawCode) {
        show404('Page Not Found', 'The requested page was not found on this server.');
        return;
      }

      const code = sanitizeCode(rawCode);
      document.getElementById('code-lbl').textContent = code;

      let config = HARDCODED_CONFIG;
      if (!config) {
        const stored = localStorage.getItem('firebase_config');
        if (stored) {
          try {
            config = JSON.parse(stored);
          } catch (e) {
            console.error("Invalid stored config", e);
          }
        }
      }

      if (!config) {
        show404('Setup Required', 'Database configuration missing. Set keys in shortlink manager.');
        return;
      }

      try {
        const app = initializeApp(config);
        const db = getFirestore(app);
        const docRef = doc(db, "shortlinks", code);
        const docSnap = await getDoc(docRef);

        if (!docSnap.exists()) {
          show404('Link Not Found', `No destination found for code: "${code}"`);
          return;
        }

        let dest = docSnap.data().url;
        if (!/^https?:\/\//i.test(dest)) {
          dest = 'https://' + dest;
        }
        window.location.href = dest;

      } catch (err) {
        show404('System Error', 'Failed to connect to database.');
        console.error(err);
      }
    }

    function show404(title, msg) {
      document.getElementById('error-title').textContent = title;
      document.getElementById('error-msg').textContent = msg;
      document.getElementById('redirect-view').classList.add('hidden');
      document.getElementById('notfound-view').classList.remove('hidden');
    }

    init();
  </script>
</body>
</html>
